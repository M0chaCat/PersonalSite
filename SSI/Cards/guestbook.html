<div id="guestbook">
    <iframe id="guestbookif" src="https://api.plushiekitty.party/book/gbook.php" title="My Guestbook" width="100%"
        height="800" style="box-shadow: var(--cardshadow); border: var(--cardborder);"></iframe>

    <a class="cornertext" id="cornertext-guestbook" href="/guestbook">Sign my guestbook!</a>
    <style>
        #guestbook {
            position: relative;
            width: 100%;
            height: 800px;
        }

        #guestbook iframe {
            width: 100%;
            height: 99%;
            display: block;
        }

        #cornertext-guestbook {
            position: absolute;
            top: 10px;
            right: -30px;
            font-size: .8vw;
            text-decoration: none;
            color: #f0e001;
            animation: bounceSize .7s infinite linear;
        }

        @keyframes bounceSize {
            0% {
                transform: scale(1) rotate(30deg);
            }

            50% {
                transform: scale(1.1) rotate(30deg)
            }

            to {
                transform: scale(1) rotate(30deg)
            }
        }
    </style>

</div>
